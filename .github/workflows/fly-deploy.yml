name: Fly Deploy

# Deploys the bot to Fly.io from a clean CI runner (no local TLS-inspection
# proxy in the way). Requires the repo secret FLY_API_TOKEN (a Fly deploy token).
on:
  push:
    branches: [main]
    paths-ignore:
      - ".github/**"
      - "**.md"
      - "tests/**"
      - "tools/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
