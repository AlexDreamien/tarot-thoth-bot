name: Fly Logs

# Manual diagnostic: dump the bot's Fly status and recent logs from a clean
# runner (local `flyctl logs` is blocked by a TLS-inspecting proxy here).
on:
  workflow_dispatch:

jobs:
  logs:
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Status
        run: flyctl status --app tarot-thoth-bot || true
      - name: Recent logs
        run: timeout 40 flyctl logs --no-tail --app tarot-thoth-bot 2>&1 | head -200 || true
