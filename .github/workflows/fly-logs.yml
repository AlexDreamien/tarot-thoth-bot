name: Fly Logs

# Manual diagnostic from a clean runner (local tooling is behind a
# TLS-inspecting proxy). SSHes into the machine to inspect the process and run
# the bot directly so any startup error is surfaced.
on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Fly status
        run: flyctl status --app tarot-thoth-bot || true

      - name: Process + env + volume (SSH)
        run: |
          flyctl ssh console --app tarot-thoth-bot -C "sh -lc 'echo ==PS==; ps aux; echo ==ENV==; env | grep -E \"ANTHROPIC_API_KEY|BOT_TOKEN|DB_PATH|TZ|CLAUDE_MODEL|DEFAULT_LANG\" | sed \"s/\\(=\\).*/=<set>/\"; echo ==DATA==; ls -la /data'" || true

      - name: Drive /start through the real dispatcher inside the machine (SSH)
        run: |
          B64=$(base64 -w0 tools/diag_feed.py)
          flyctl ssh console --app tarot-thoth-bot -C "sh -lc \"cd /app && echo $B64 | base64 -d | python -\"" 2>&1 | head -120 || true
