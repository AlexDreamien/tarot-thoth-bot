name: Fly Logs

# Manual diagnostic run from a clean runner (local tooling is behind a
# TLS-inspecting proxy). Checks Fly state, that secrets are set, and — from the
# Telegram side — whether the bot is actually polling.
on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Fly status
        run: flyctl status --app tarot-thoth-bot || true

      - name: Fly secrets (names only)
        run: flyctl secrets list --app tarot-thoth-bot || true

      - name: Telegram getMe (token valid?)
        run: |
          curl -s "https://api.telegram.org/bot${BOT_TOKEN}/getMe" \
            | python3 -c "import sys,json;d=json.load(sys.stdin);print('ok=',d.get('ok'),'username=',d.get('result',{}).get('username'),'err=',d.get('description'))"

      - name: Telegram getWebhookInfo (a webhook breaks polling)
        run: |
          curl -s "https://api.telegram.org/bot${BOT_TOKEN}/getWebhookInfo" \
            | python3 -c "import sys,json;d=json.load(sys.stdin).get('result',{});print('webhook_url=',repr(d.get('url')),'pending=',d.get('pending_update_count'),'last_error=',d.get('last_error_message'))"

      - name: Telegram getUpdates probe (HTTP 409 == bot IS polling)
        run: |
          code=$(curl -s -o /tmp/u.json -w "%{http_code}" "https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?limit=1&timeout=0")
          echo "HTTP $code"
          python3 -c "import json;d=json.load(open('/tmp/u.json'));print('ok=',d.get('ok'),'desc=',d.get('description'),'n_updates=',len(d.get('result',[]) or []))"

      - name: Fly live logs (35s)
        run: timeout 35 flyctl logs --app tarot-thoth-bot 2>&1 | head -200 || true
